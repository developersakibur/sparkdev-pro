<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SVG Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
<div class="shell">

  <header class="header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      SVG Vault
    </div>
    <span class="badge">v2.0</span>
  </header>

  <!-- Input -->
  <section class="section">
    <label class="label">SVG Code</label>
    <div class="textarea-wrap">
      <textarea id="svgInput" spellcheck="false" placeholder="<svg xmlns=&quot;...&quot;>...</svg>"></textarea>
      <button class="clear-btn" id="clearBtn" title="Clear">✕</button>
    </div>
  </section>

  <!-- Preview -->
  <section class="section">
    <label class="label">Preview</label>
    <canvas id="previewCanvas" width="220" height="220" style="display:none"></canvas>
    <div class="preview-box" id="previewBox">
      <span class="preview-hint">Paste SVG above to preview</span>
    </div>
    <div class="filename-row">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span id="filenameDisplay">—</span>
    </div>
  </section>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="icon">Icon</button>
    <button class="tab" data-tab="background">Background</button>
  </div>

  <!-- Icon Tab -->
  <div class="tab-panel active" id="tab-icon">
    <div class="controls-grid">
      <div class="control-card">
        <div class="control-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
          Icon Color
        </div>
        <div class="color-row">
          <input type="color" id="colorPicker" value="#edbc4a"/>
          <input type="text" id="colorHex" class="hex-input" value="#edbc4a" maxlength="7" placeholder="#edbc4a"/>
          <button class="ghost-btn" id="resetColor" title="Reset">↺</button>
        </div>
        <label class="toggle-row">
          <input type="checkbox" id="colorEnabled" checked/>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-label">Override color</span>
        </label>
      </div>

      <div class="control-card">
        <div class="control-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 21H3"/><path d="M21 3v18"/><path d="m13 3-10 18"/></svg>
          Icon Size
        </div>
        <div class="size-presets">
          <button class="preset-btn" data-size="16">16</button>
          <button class="preset-btn" data-size="32">32</button>
          <button class="preset-btn" data-size="64">64</button>
          <button class="preset-btn" data-size="128">128</button>
          <button class="preset-btn" data-size="256">256</button>
        </div>
        <div class="size-custom-row">
          <input type="number" id="sizeW" class="size-input" placeholder="W" min="1" max="4096"/>
          <span class="size-sep">×</span>
          <input type="number" id="sizeH" class="size-input" placeholder="H" min="1" max="4096"/>
          <label class="lock-label" title="Lock aspect ratio">
            <input type="checkbox" id="lockAR" checked/>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </label>
        </div>
        <label class="toggle-row">
          <input type="checkbox" id="sizeEnabled"/>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-label">Override size</span>
        </label>
      </div>
    </div>
  </div>

  <!-- Background Tab -->
  <div class="tab-panel" id="tab-background">

    <!-- Shape picker -->
    <div class="section">
      <label class="label">Background Shape</label>
      <div class="shape-grid" id="shapeGrid"></div>
    </div>

    <div class="controls-grid" style="margin-top:10px">
      <!-- Layout -->
      <div class="control-card">
        <div class="control-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Layout
        </div>
        <div class="slider-row">
          <span class="slider-lbl">Padding</span>
          <input type="range" id="bgPadding" min="0" max="80" value="20"/>
          <span class="slider-val" id="bgPaddingVal">20</span>
        </div>
        <div class="slider-row">
          <span class="slider-lbl">Rotate</span>
          <input type="range" id="bgRotation" min="0" max="360" value="0"/>
          <span class="slider-val" id="bgRotationVal">0°</span>
        </div>
        <label class="toggle-row" style="margin-top:4px">
          <input type="checkbox" id="bgEnabled"/>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-label">Enable background</span>
        </label>
      </div>

      <!-- Fill -->
      <div class="control-card">
        <div class="control-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 11-8-8-8.5 8.5a5.5 5.5 0 0 0 7.78 7.78L19 11z"/><path d="m5 2 5 5"/></svg>
          Fill Color
        </div>
        <div class="color-row">
          <input type="color" id="bgColor1" value="#edbc4a"/>
          <input type="text" id="bgHex1" class="hex-input" value="#7c6aff" maxlength="7"/>
        </div>
        <label class="toggle-row">
          <input type="checkbox" id="bgGradient"/>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-label">Gradient (2nd color)</span>
        </label>
        <div class="color-row" id="bgColor2Row" style="opacity:0.35;pointer-events:none;transition:opacity .2s">
          <input type="color" id="bgColor2" value="#ff6a6a"/>
          <input type="text" id="bgHex2" class="hex-input" value="#ff6a6a" maxlength="7"/>
        </div>
        <div class="slider-row" style="margin-top:4px">
          <span class="slider-lbl">Opacity</span>
          <input type="range" id="bgOpacity" min="0" max="100" value="100"/>
          <span class="slider-val" id="bgOpacityVal">100%</span>
        </div>
      </div>
    </div>

    <div class="controls-grid" style="margin-top:10px">
      <!-- Stroke -->
      <div class="control-card">
        <div class="control-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          Stroke / Border
        </div>
        <div class="color-row">
          <input type="color" id="strokeColor" value="#ffffff"/>
          <input type="text" id="strokeHex" class="hex-input" value="#ffffff" maxlength="7"/>
        </div>
        <div class="slider-row">
          <span class="slider-lbl">Width</span>
          <input type="range" id="strokeWidth" min="0" max="24" value="2"/>
          <span class="slider-val" id="strokeWidthVal">2</span>
        </div>
        <label class="toggle-row">
          <input type="checkbox" id="strokeEnabled"/>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-label">Enable stroke</span>
        </label>
      </div>

      <!-- Shadow -->
      <div class="control-card">
        <div class="control-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 8.5 9 12l-3.5 3.5L2 12l3.5-3.5z"/><path d="m12 2 3.5 3.5L12 9 8.5 5.5 12 2z"/><path d="M18.5 8.5 22 12l-3.5 3.5L15 12l3.5-3.5z"/><path d="m12 15 3.5 3.5L12 22l-3.5-3.5L12 15z"/></svg>
          Shadow
        </div>
        <div class="color-row">
          <input type="color" id="shadowColor" value="#000000"/>
          <input type="text" id="shadowHex" class="hex-input" value="#000000" maxlength="7"/>
        </div>
        <div class="slider-row">
          <span class="slider-lbl">Blur</span>
          <input type="range" id="shadowBlur" min="0" max="40" value="10"/>
          <span class="slider-val" id="shadowBlurVal">10</span>
        </div>
        <div class="slider-row">
          <span class="slider-lbl">Offset Y</span>
          <input type="range" id="shadowOffset" min="0" max="30" value="4"/>
          <span class="slider-val" id="shadowOffsetVal">4</span>
        </div>
        <div class="slider-row">
          <span class="slider-lbl">Opacity</span>
          <input type="range" id="shadowOpacity" min="0" max="100" value="40"/>
          <span class="slider-val" id="shadowOpacityVal">40%</span>
        </div>
        <label class="toggle-row">
          <input type="checkbox" id="shadowEnabled"/>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-label">Enable shadow</span>
        </label>
      </div>
    </div>

  </div><!-- /tab-background -->

  <!-- Downloads -->
  <section class="section download-section">
    <button class="dl-btn svg-btn" id="downloadSvg">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download SVG
    </button>
    <button class="dl-btn png-btn" id="downloadPng">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
      Export PNG
    </button>
  </section>

  <div class="toast" id="toast"></div>
</div>
<script src="popup.js"></script>
</body>
</html>
