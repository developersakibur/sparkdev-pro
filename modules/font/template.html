<div class="sd-l-header">
  <h1>Font</h1>
  <div class="sd-u-flex sd-u-items-center" style="gap: 12px;">
    <div class="sd-u-flex sd-u-items-center" style="gap: 6px;">
      <span style="font-size: 9px; font-weight: 700; color: var(--sd-color-text-muted); text-transform: uppercase;">Multi</span>
      <label class="sd-c-toggle">
        <input type="checkbox" id="multiFindToggle">
        <span class="sd-c-toggle__slider"></span>
      </label>
    </div>
  </div>
</div>

<div class="sd-l-container">
  <button class="sd-c-btn sd-c-btn--primary sd-c-btn--block sd-u-mb-8" id="startFontFinderBtn">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M4 7V4h16v3"></path><path d="M9 20h6"></path><path d="M12 4v16"></path></svg>
    <span>Start Font Finder</span>
  </button>

  <div class="font-info-section">
    <div class="sd-u-flex sd-u-items-center sd-u-justify-between sd-u-mb-4" style="position: relative;">
      <h2 style="font-size: 14px; font-weight: 600; color: var(--sd-color-text-primary); margin: 0;">Captured Fonts</h2>
      <span id="fontCount" class="sd-u-color-muted" style="font-size: 11px; position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-family: 'JetBrains Mono', monospace;">0</span>
    </div>

    <div class="font-history-table-wrapper">
      <table class="font-history-table">
        <thead>
          <tr>
            <th style="width: 25px; padding-left: 10px;">#</th>
            <th>Family</th>
            <th style="width: 50px;">Size</th>
            <th style="width: 40px;">Wgt</th>
            <th style="width: 40px;">L.H</th>
            <th style="width: 60px; padding-right: 10px;">Color</th>
          </tr>
        </thead>
        <tbody id="fontHistoryBody">
          <!-- Font data will be injected here -->
        </tbody>
      </table>
      <div id="noFontHistory" class="sd-u-text-center sd-u-py-8 sd-u-color-muted" style="font-size: 12px; padding: 20px;">
        Click "Start" then hover & click text on any website to capture styles.
      </div>
    </div>
  </div>
</div>
