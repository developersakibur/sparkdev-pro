<div class="sd-l-header">
  <h1>Font Finder</h1>
  <div class="sd-u-flex sd-u-items-center" style="gap: 8px;">
    <button class="sd-c-btn sd-c-btn--ghost sd-c-btn--icon" id="fontClearBtn" title="Clear History" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--sd-color-text-muted); transition: all 0.2s ease;">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
    </button>
  </div>
</div>

<div class="sd-l-container">
  <button class="sd-c-btn sd-c-btn--primary sd-c-btn--block" id="startFontFinderBtn">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M4 7V4h16v3"></path><path d="M9 20h6"></path><path d="M12 4v16"></path></svg>
    <span>Start Font Finder</span>
  </button>

  <div class="font-info-section">
    <div class="font-history-table-wrapper">
      <table class="font-history-table">
        <thead>
          <tr>
            <th style="width: 25px; padding-left: 10px;">#</th>
            <th>Family</th>
            <th style="width: 50px;">Size</th>
            <th style="width: 40px;">Wgt</th>
            <th style="width: 40px;">L.H</th>
            <th style="width: 60px; padding-right: 10px;">Color</th>
          </tr>
        </thead>
        <tbody id="fontHistoryBody">
          <!-- Font data will be injected here -->
        </tbody>
      </table>
      <div id="noFontHistory" class="sd-u-text-center sd-u-py-8 sd-u-color-muted" style="font-size: 12px; padding: 20px;">
        Click "Start" then hover & click text on any website to capture styles.
      </div>
    </div>
  </div>
</div>
