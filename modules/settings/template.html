<div class="sd-l-header">
  <h1>Settings</h1>
</div>

<div class="sd-l-container">
  <!-- Setting Row 1 -->
  <div class="sd-c-well" style="padding: 12px 16px;">
    <div class="sd-u-flex sd-u-items-center sd-u-justify-between sd-u-full-width">
      <div style="text-align: left;">
        <h3 style="font-size: 13px; font-weight: 600; color: var(--sd-color-text-primary); margin-bottom: 2px;">Advanced Color Picker</h3>
        <p style="font-size: 11px; color: var(--sd-color-text-muted);">High-precision picker with zoom</p>
      </div>
      <label class="sd-c-toggle">
        <input type="checkbox" id="settingAdvancedPicker">
        <span class="sd-c-toggle__slider"></span>
      </label>
    </div>
  </div>

  <!-- Setting Row 2 -->
  <div class="sd-c-well" style="padding: 12px 16px;">
    <div class="sd-u-flex sd-u-items-center sd-u-justify-between sd-u-full-width">
      <div style="text-align: left;">
        <h3 style="font-size: 13px; font-weight: 600; color: var(--sd-color-text-primary); margin-bottom: 2px;">Copy Link Text</h3>
        <p style="font-size: 11px; color: var(--sd-color-text-muted);">Copy text inside links via right-click</p>
      </div>
      <label class="sd-c-toggle">
        <input type="checkbox" id="settingCopyLinkText">
        <span class="sd-c-toggle__slider"></span>
      </label>
    </div>
  </div>

  <!-- Setting Row 3 -->
  <div class="sd-c-well" style="padding: 12px 16px;">
    <div class="sd-u-flex sd-u-items-center sd-u-justify-between sd-u-full-width">
      <div style="text-align: left;">
        <h3 style="font-size: 13px; font-weight: 600; color: var(--sd-color-text-primary); margin-bottom: 2px;">Enable Right-Click</h3>
        <p style="font-size: 11px; color: var(--sd-color-text-muted);">Bypass disabled context menus</p>
      </div>
      <label class="sd-c-toggle">
        <input type="checkbox" id="settingRightClick">
        <span class="sd-c-toggle__slider"></span>
      </label>
    </div>
  </div>

  <p class="sd-u-color-muted sd-u-text-center" style="font-size: 10px; margin-top: 12px; opacity: 0.7;">
    Preferences are saved automatically.
  </p>
</div>
