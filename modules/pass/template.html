<div class="sd-l-header">
  <h1>Pass Generator</h1>
  <button class="sd-c-btn sd-c-btn--ghost sd-c-btn--icon" id="regenPassBtn" title="Regenerate">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><polyline points="21 3 21 8 16 8"></polyline></svg>
  </button>
</div>

<div class="sd-c-well sd-u-mb-4" id="passDisplay">
  <span class="sd-u-color-muted">Click Regenerate</span>
</div>

<div class="sd-l-container">
  <div class="sd-l-flex-between">
    <span class="sd-u-color-secondary sd-u-weight-medium">Length</span>
    <div style="flex: 0 0 65%; display: flex; justify-content: flex-end;">
      <input type="number" id="passLength" min="8" max="64" value="16" class="sd-c-input sd-c-input--sm sd-u-font-mono" style="width: 44px; text-align: center;">
    </div>
  </div>
  <div class="sd-l-flex-between">
    <span class="sd-u-color-secondary sd-u-weight-medium">Uppercase</span>
    <label class="sd-c-toggle">
      <input type="checkbox" id="passUpper" checked>
      <span class="sd-c-toggle__slider"></span>
    </label>
  </div>
  <div class="sd-l-flex-between">
    <span class="sd-u-color-secondary sd-u-weight-medium">Lowercase</span>
    <label class="sd-c-toggle">
      <input type="checkbox" id="passLower" checked>
      <span class="sd-c-toggle__slider"></span>
    </label>
  </div>
  <div class="sd-l-flex-between">
    <span class="sd-u-color-secondary sd-u-weight-medium">Numbers</span>
    <label class="sd-c-toggle">
      <input type="checkbox" id="passNumbers" checked>
      <span class="sd-c-toggle__slider"></span>
    </label>
  </div>
  <div class="sd-l-flex-between">
    <span class="sd-u-color-secondary sd-u-weight-medium">Symbols</span>
    <label class="sd-c-toggle">
      <input type="checkbox" id="passSymbols" checked>
      <span class="sd-c-toggle__slider"></span>
    </label>
  </div>
</div>
