<div class="sd-l-header">
  <h1>Svg Vault</h1>
  <button class="sd-c-btn sd-c-btn--ghost-cyan sd-c-btn--icon" id="svgClearBtn" title="Clear All">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
  </button>
</div>

<!-- Raw SVG Input Area -->
<div class="sd-l-stack sd-u-mb-4">
  <textarea id="svgInput" class="sd-c-input sd-u-font-mono" style="width: 100%; height: 140px; font-size: 11px; resize: none; padding: 10px;" spellcheck="false" placeholder="Paste your raw <svg>...</svg> code here..."></textarea>
</div>

<!-- Live Preview Box -->
<div class="sd-l-stack sd-u-mb-4" style="flex: 1; display: flex; flex-direction: column;">
  <span class="sd-u-color-dim sd-u-mb-1" style="font-size: 11px; font-weight: 500;">Preview</span>
  <div class="sd-c-well" id="svgPreviewBox" style="width: 100%; height: 180px; padding: 12px; overflow: auto; background: #000; border: 1px solid var(--sd-color-border-hover); display: flex; align-items: center; justify-content: center; border-radius: var(--sd-radius-md);">
    <span class="sd-u-color-dim" style="font-size: 12px;">Paste SVG to preview</span>
  </div>
</div>

<!-- Copy and Download Buttons -->
<div class="sd-u-mt-auto">
  <button class="sd-c-btn sd-c-btn--primary sd-u-full-width" id="svgDownloadBtn">Download SVG</button>
</div>
