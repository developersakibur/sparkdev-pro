<div class="sd-l-header">
  <h1>Text Transformer</h1>
  <div class="sd-u-flex sd-u-gap-2">
    <div class="sd-c-badge sd-c-badge--cyan" title="Characters">
      <span id="textCharCount">0</span> Chars
    </div>
    <div class="sd-c-badge sd-c-badge--blue" title="Words">
      <span id="textWordCount">0</span> Words
    </div>
  </div>
</div>

<div class="sd-u-mb-4">
  <textarea id="textInput" class="sd-c-input sd-u-full-width sd-u-font-mono" style="min-height: 120px; resize: vertical; padding: 12px; font-size: 12px;" placeholder="Paste or type your text here..."></textarea>
</div>

<div class="sd-u-mb-4">
  <div class="sd-l-grid-2 sd-u-gap-2">
    <button class="sd-c-btn sd-c-btn--secondary sd-u-text-sm text-conv-btn" data-case="sentence">Sentence case</button>
    <button class="sd-c-btn sd-c-btn--secondary sd-u-text-sm text-conv-btn" data-case="lower">lower case</button>
    <button class="sd-c-btn sd-c-btn--secondary sd-u-text-sm text-conv-btn" data-case="upper">UPPER CASE</button>
    <button class="sd-c-btn sd-c-btn--secondary sd-u-text-sm text-conv-btn" data-case="capitalized">Capitalized Case</button>
    <button class="sd-c-btn sd-c-btn--secondary sd-u-text-sm text-conv-btn" data-case="alternating">aLtErNaTiNg</button>
    <button class="sd-c-btn sd-c-btn--secondary sd-u-text-sm text-conv-btn" data-case="title">Title Case</button>
    <button class="sd-c-btn sd-c-btn--secondary sd-u-text-sm text-conv-btn" data-case="inverse">InVeRsE CaSe</button>
    <button class="sd-c-btn sd-c-btn--secondary sd-u-text-sm text-conv-btn" data-case="slug">URL Slug-ify</button>
  </div>
</div>

<div class="sd-u-flex sd-u-gap-2">
  <button id="textCopyBtn" class="sd-c-btn sd-c-btn--primary sd-u-flex-1">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="sd-u-mr-2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
    Copy
  </button>
  <button id="textDownloadBtn" class="sd-c-btn sd-c-btn--secondary">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
  </button>
  <button id="textClearBtn" class="sd-c-btn sd-c-btn--error">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
  </button>
</div>

<div id="textFeedback" class="sd-c-well sd-u-mt-4 sd-u-hide">Ready to transform...</div>
