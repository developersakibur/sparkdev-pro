<div class="sd-l-header">
  <h1>Color</h1>
  <div class="sd-u-flex sd-u-items-center" style="gap: 12px;">
    <div class="sd-u-flex sd-u-items-center" style="gap: 6px;" title="Use Advanced Picker (Element Highlighter)">
      <label class="sd-c-toggle">
        <input type="checkbox" id="pickerModeToggle">
        <span class="sd-c-toggle__slider"></span>
      </label>
    </div>
  </div>
</div>

<div class="sd-l-container">
  <button class="sd-c-btn sd-c-btn--primary sd-c-btn--block sd-u-mb-8" id="pickColorBtn">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="m2 22 1-1h3l9-9"></path><path d="M3 21v-3l9-9"></path><path d="m15 6 3.4-3.4a2.1 2.1 0 1 1 3 3L18 9l-3-3Z"></path></svg>
    <span>Pick Color</span>
  </button>

  <div class="color-history-section">
    <div class="sd-u-flex sd-u-items-center sd-u-justify-between sd-u-mb-4">
      <h2 style="font-size: 14px; font-weight: 600; color: var(--sd-color-text-primary); margin: 0;">Palette & History</h2>
      <button class="sd-c-btn sd-c-btn--ghost sd-c-btn--icon" id="colorClearBtn" title="Clear History" style="width: 28px; height: 28px;">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      </button>
    </div>

    <div class="color-history-table-wrapper">
      <table class="color-history-table">
        <thead>
          <tr>
            <th style="width: 34px; padding-left: 10px;">Drag</th>
            <th style="width: 40px;">Prv</th>
            <th style="width: 65px;">HEX</th>
            <th>Name</th>
            <th style="width: 50px; text-align: center;">Favorite</th>
            <th style="width: 50px; text-align: center; padding-right: 10px;">Copy</th>
          </tr>
        </thead>
        <tbody id="colorHistoryBody">
          <!-- History items will be injected here -->
        </tbody>
      </table>
      <div id="noHistory" class="sd-u-text-center sd-u-py-8 sd-u-color-muted" style="font-size: 12px;">
        No colors picked yet.
      </div>
    </div>
  </div>
</div>
