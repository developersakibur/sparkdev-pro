<div class="sd-l-header">
  <h1>WP Quick Tools</h1>
  <label class="sd-c-toggle">
    <input type="checkbox" id="elementorLoaderToggle">
    <span class="sd-c-toggle__slider"></span>
  </label>
</div>

<div class="sd-l-container">
  <div class="sd-c-segmented">
    <button class="sd-c-segmented__btn" id="beforeBtn">← Before</button>
    <button class="sd-c-segmented__btn active" id="afterBtn">After →</button>
  </div>

  <div id="wpSection" class="sd-l-grid-2">
    <button class="sd-c-btn sd-c-btn--secondary" data-url="/wp-admin/">
      <span>WP-Admin</span>
    </button>
    <button class="sd-c-btn sd-c-btn--secondary" data-url="/wp-admin/admin.php?page=ai1wm_export">
      <span>All In One</span>
    </button>
  </div>

  <div class="sd-l-grid-2">
    <button class="sd-c-btn sd-c-btn--secondary" id="viewWebsiteBtn">
      <span>Normal</span>
    </button>
    <button class="sd-c-btn sd-c-btn--secondary" id="websiteIncognitoBtn">
      <span>Incognito</span>
    </button>
  </div>

  <div class="sd-l-grid-2">
    <button class="sd-c-btn sd-c-btn--secondary" id="normalVisitBtn">
      <span>NC Normal</span>
    </button>
    <button class="sd-c-btn sd-c-btn--secondary" id="incognitoBtn">
      <span>NC Incognito</span>
    </button>
  </div>

  <div class="sd-l-grid-2">
    <button class="sd-c-btn sd-c-btn--secondary" id="pageSpeedBtn">
      <span>Speed</span>
    </button>
    <button class="sd-c-btn sd-c-btn--secondary" id="dnsCheckerBtn">
      <span>DNS</span>
    </button>
  </div>
</div>
