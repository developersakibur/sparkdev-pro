<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SparkDev Pro</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="modules/clamp/style.css">
  <link rel="stylesheet" href="modules/webp/style.css">
  <link rel="stylesheet" href="modules/wp-tools/style.css">
</head>
<body>
  <div class="tabs-nav">
    <button class="tab-btn active" data-tab="tab-clamp">Clamp</button>
    <button class="tab-btn" data-tab="tab-webp">WebP</button>
    <button class="tab-btn" data-tab="tab-wp">WP Tools</button>
  </div>

  <div id="tab-clamp" class="tab-content active">
    <div class="header">
      <h1>clamp() Generator</h1>
      <div class="toggle-container">
        <label class="toggle-switch">
          <input type="checkbox" id="configToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="input-grid">
      <div class="input-group">
        <input id="minSize" type="number" value="" step="1" placeholder="Min">
      </div>
      <div class="input-group">
        <input id="maxSizeClamp" type="number" value="20" step="1" placeholder="Max" autofocus>
      </div>
    </div>

    <div class="radio-grid">
      <div class="radio-option">
        <input type="radio" name="propertyType" id="radioText" value="text" checked>
        <label for="radioText">Text</label>
      </div>
      <div class="radio-option">
        <input type="radio" name="propertyType" id="radioPadding" value="padding">
        <label for="radioPadding">Spacing</label>
      </div>
    </div>

    <div class="config-section">
      <div class="config-row">
        <div class="config-pair">
          <input id="configMinValue" type="number" min="1" max="500" step="1" placeholder="Min Val">
          <input id="configMinVp" type="number" min="1" max="2000" step="1" placeholder="Min VP">
        </div>
        <div class="config-pair">
          <input id="configMaxValue" type="number" min="1" max="500" step="1" placeholder="Max Val">
          <input id="configMaxVp" type="number" min="1" max="2000" step="1" placeholder="Max VP">
        </div>
      </div>
      <div class="config-row">
        <div class="config-pair">
          <input id="minWidth" type="number" min="1" max="5000" step="1" placeholder="Min Width">
          <input id="maxWidth" type="number" min="1" max="5000" step="1" placeholder="Max Width">
        </div>
      </div>
      <div class="config-row config-pair">
        <div class="slider-row">
          <div class="vp-badge-small" id="sliderMinBadge">
            <span id="sliderCurrentVp">375</span>
          </div>
          <div class="slider-wrap-preview">
            <div class="track-bg-preview"></div>
            <div class="track-fill-preview" id="sliderTrackFill"></div>
            <input type="range" id="vpPreviewSlider" min="375" max="1440" value="375" step="1">
          </div>
          <div class="vp-badge-small" id="sliderMaxBadge">
            <span id="sliderCurrentClamp">00.00</span>
          </div>
        </div>
      </div>
    </div>

    <div id="resultClamp" class="clamp-output">0px, 0.00px + 0.00vw, 0px</div>
  </div>

  <div id="tab-webp" class="tab-content">
    <div class="header">
      <h1>WebP Pro</h1>
      <div class="toggle-container">
        <label class="toggle-switch">
          <input type="checkbox" id="zipToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="input-grid">
      <div class="input-group">
        <div class="range-wrap">
          <input type="range" id="qualitySlider" min="1" max="100" value="25"/>
          <span id="qVal">25%</span>
        </div>
      </div>
      <div class="input-group" style="flex: 0 0 100px;">
        <input type="number" id="maxSizeWebP" value="50" min="10" max="9999"/>
      </div>
    </div>

    <div class="drop" id="drop">
      <input type="file" id="fileIn" accept="image/*" multiple/>
      <div class="drop-title">Drop Images Here</div>
      <div class="drop-sub">JPG, PNG, GIF, WEBP supported</div>
    </div>

    <div class="file-list" id="fileList">
      <div class="empty">No images selected yet</div>
    </div>

    <div class="summary" id="summary">
      <div class="si"><div class="si-v" id="sCount">0</div><div class="si-k">Files</div></div>
      <div class="si"><div class="si-v" id="sOrig">0 KB</div><div class="si-k">Original</div></div>
      <div class="si"><div class="si-v" id="sSaved">0%</div><div class="si-k">Saved</div></div>
      <div class="si"><div class="si-v" id="sFinal">0 KB</div><div class="si-k">Final</div></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="convertBtn" disabled>Convert & Download</button>
    </div>
  </div>

  <div id="tab-wp" class="tab-content">
    <div class="header">
      <h1>WP Quick Tools</h1>
      <div class="toggle-container">
        <label class="toggle-label" style="font-size: 9px; margin-right: 8px;">Hide Loader</label>
        <label class="toggle-switch">
          <input type="checkbox" id="elementorLoaderToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="container">
      <div class="section">
        <div class="position-toggle">
          <button class="position-btn" id="beforeBtn">← Before</button>
          <button class="position-btn active" id="afterBtn">After →</button>
        </div>
      </div>

      <div id="wpSection" class="section">
        <div class="link-grid">
          <div class="link-item" data-url="/wp-admin/">
            <div class="link-label">
              <span>WP-Admin</span>
            </div>
            <span class="link-arrow">→</span>
          </div>
          <div class="link-item" data-url="/wp-admin/admin.php?page=ai1wm_export">
            <div class="link-label">
              <span>All In One</span>
            </div>
            <span class="link-arrow">→</span>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="tool-grid">
          <button class="btn" id="viewWebsiteBtn">
            <span>Normal</span>
          </button>
          <button class="btn" id="websiteIncognitoBtn">
            <span>Incognito</span>
          </button>
        </div>
      </div>

      <div class="section">
        <div class="tool-grid">
          <button class="btn" id="normalVisitBtn">
            <span>NC Normal</span>
          </button>
          <button class="btn" id="incognitoBtn">
            <span>NC Incognito</span>
          </button>
        </div>
      </div>

      <div class="section">
        <div class="tool-grid">
          <button class="btn" id="pageSpeedBtn">
            <span>Speed</span>
          </button>
          <button class="btn" id="dnsCheckerBtn">
            <span>DNS</span>
          </button>
        </div>
      </div>

      <div class="section">
        <button class="btn btn-primary" id="copyUrlBtn">
          <span>Copy URL | Freepik Tool</span>
        </button>
      </div>
    </div>
  </div>

  <script src="assets/libs/jszip.min.js"></script>
  <script src="core/tab-manager.js"></script>
  <script src="modules/clamp/script.js"></script>
  <script src="modules/webp/script.js"></script>
  <script src="modules/wp-tools/script.js"></script>
</body>
</html>
